<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comic Creator — Dũng & Hà Lan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Bangers&family=Caveat:wght@400;700&family=Pangolin&family=Be+Vietnam+Pro:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root{--ink:#2C2416;--beige:#F2ECD8;--coral:#E08160;--sage:#7A9A78}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#111;color:#ddd;display:flex;height:100vh;overflow:hidden}
#ed{width:310px;min-width:310px;background:#181818;padding:12px;overflow-y:auto;border-right:1px solid #222;display:flex;flex-direction:column;gap:7px}
#ed h1{font-size:13px;font-weight:800;color:#fff}
#ed .sub{font-size:9px;color:#444}
.sec{background:#1f1f1f;border-radius:6px;padding:9px;border:1px solid #262626}
.sec h3{font-size:9px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px}
.f{margin-bottom:5px}
.f label{display:block;font-size:9px;color:#666;margin-bottom:2px}
.f input,.f textarea,.f select{width:100%;background:#111;border:1px solid #2e2e2e;border-radius:4px;color:#bbb;padding:4px 6px;font-size:10px;font-family:inherit;resize:vertical}
.f input:focus,.f textarea:focus,.f select:focus{outline:none;border-color:#C85C3E}
.f textarea{min-height:36px;line-height:1.4}
.r2{display:flex;gap:4px}.r2 .f{flex:1}
.pills{display:flex;gap:3px;flex-wrap:wrap}
.pill{padding:3px 7px;border-radius:999px;border:1px solid #2e2e2e;background:#111;color:#555;font-size:9px;cursor:pointer;white-space:nowrap;transition:all .1s}
.pill.on{border-color:#C85C3E;color:#C85C3E;background:#1e1008}
.pill.b.on{border-color:#5B9BD5;color:#5B9BD5;background:#0d1828}
.sws{display:flex;gap:3px;flex-wrap:wrap;align-items:center}
.sw{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .1s;flex-shrink:0}
.sw.on{border-color:#fff;transform:scale(1.2)}
.sw-c{position:relative;width:20px;height:20px}
.sw-c .sw{border-style:dashed;border-color:#444}
.sw-c input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.ped{background:#161616;border-radius:5px;padding:8px;border:1px solid #1e1e1e;margin-bottom:6px}
.ped h4{font-size:9px;font-weight:700;color:#C85C3E;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.btn{display:inline-flex;align-items:center;gap:3px;padding:6px 12px;border-radius:5px;font-size:10px;font-weight:700;cursor:pointer;border:none;transition:opacity .1s;font-family:inherit}
.btn-p{background:#C85C3E;color:#fff}.btn-s{background:#222;color:#888}
.btn:hover{opacity:.85}.btn:disabled{opacity:.4;cursor:wait}
.brow{display:flex;gap:5px;flex-wrap:wrap;padding-top:2px}
#pv{flex:1;display:flex;align-items:center;justify-content:center;background:#0a0a0a;padding:12px;overflow:auto}
#cw svg{display:block;border-radius:2px;box-shadow:0 10px 36px rgba(0,0,0,.85)}
#ed::-webkit-scrollbar{width:3px}#ed::-webkit-scrollbar-track{background:#111}#ed::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px}

/* tooltip */
[title]{position:relative}
[title]:hover::after{content:attr(title);position:fixed;background:#1a1a1a;color:#ddd;font-size:10px;padding:4px 8px;border-radius:4px;border:1px solid #333;white-space:nowrap;z-index:999;pointer-events:none;transform:translateX(-50%);margin-top:22px;left:50%}

/* shape preview pills */
.pill.shape-pill{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:4px 9px}

/* ── TOOLBAR (undo/redo/save status) ── */
#toolbar{display:flex;align-items:center;gap:6px;padding:6px 10px;background:#141414;border-bottom:1px solid #222;flex-shrink:0}
#toolbar button{background:#1e1e1e;border:1px solid #2a2a2a;color:#888;border-radius:4px;padding:4px 8px;font-size:10px;cursor:pointer;transition:all .1s;font-family:inherit}
#toolbar button:hover:not(:disabled){background:#2a2a2a;color:#ccc}
#toolbar button:disabled{opacity:.3;cursor:default}
#toolbar button.danger{color:#C85C3E}
#save-status{font-size:9px;color:#444;margin-left:auto;font-style:italic}
#save-status.saving{color:#7A9A78}
#save-status.offline{color:#D4A843}

/* ── TEMPLATE MODAL ── */
#tpl-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:1000;align-items:center;justify-content:center}
#tpl-modal.open{display:flex}
#tpl-box{background:#1a1a1a;border:1px solid #2e2e2e;border-radius:10px;width:min(780px,95vw);max-height:88vh;overflow:hidden;display:flex;flex-direction:column}
#tpl-box header{padding:14px 18px;border-bottom:1px solid #222;display:flex;align-items:center;gap:10px}
#tpl-box header h2{font-size:13px;font-weight:700;color:#fff;flex:1}
#tpl-box header button{background:#222;border:1px solid #333;color:#888;border-radius:4px;padding:4px 10px;font-size:10px;cursor:pointer}
#tpl-cats{display:flex;gap:5px;padding:10px 18px;border-bottom:1px solid #1e1e1e;flex-wrap:wrap}
#tpl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;padding:14px 18px;overflow-y:auto;flex:1}
.tpl-card{background:#222;border:1px solid #2a2a2a;border-radius:6px;padding:10px;cursor:pointer;transition:all .12s;position:relative}
.tpl-card:hover{border-color:#C85C3E;background:#1e1008}
.tpl-card .tpl-thumb{width:100%;aspect-ratio:1/1.2;background:#2a2a2a;border-radius:4px;margin-bottom:7px;display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden}
.tpl-card .tpl-name{font-size:10px;font-weight:700;color:#ccc}
.tpl-card .tpl-desc{font-size:9px;color:#555;margin-top:2px;line-height:1.3}
.tpl-card .tpl-tag{position:absolute;top:6px;right:6px;font-size:8px;padding:2px 5px;border-radius:999px;background:#C85C3E;color:#fff}

/* ── PANEL DRAG-AND-DROP ── */
.ped.dragging{opacity:.4;border-style:dashed}
.ped.drag-over{border-color:#C85C3E;background:#1e1008}
.drag-handle{cursor:grab;color:#333;font-size:13px;margin-right:4px;user-select:none}
.drag-handle:active{cursor:grabbing}

/* ── PANEL CONTEXT MENU ── */
#ctx-menu{display:none;position:fixed;background:#1a1a1a;border:1px solid #2e2e2e;border-radius:6px;padding:4px;z-index:500;min-width:160px;box-shadow:0 8px 24px rgba(0,0,0,.6)}
#ctx-menu.open{display:block}
#ctx-menu button{display:flex;align-items:center;gap:7px;width:100%;background:none;border:none;color:#bbb;padding:6px 10px;font-size:10px;cursor:pointer;border-radius:4px;text-align:left;font-family:inherit}
#ctx-menu button:hover{background:#2a2a2a;color:#fff}
#ctx-menu .ctx-sep{height:1px;background:#222;margin:3px 0}

/* ── EMOTION PICKER ── */
#em-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:1001;align-items:center;justify-content:center}
#em-modal.open{display:flex}
#em-box{background:#1a1a1a;border:1px solid #2e2e2e;border-radius:10px;width:min(540px,95vw);max-height:80vh;display:flex;flex-direction:column}
#em-box header{padding:12px 16px;border-bottom:1px solid #222;display:flex;gap:8px;align-items:center}
#em-box header h2{font-size:12px;font-weight:700;color:#fff;flex:1}
#em-search{flex:1;background:#111;border:1px solid #333;border-radius:4px;color:#ccc;padding:4px 8px;font-size:11px;font-family:inherit}
#em-grid{overflow-y:auto;padding:10px 14px;flex:1}
.em-group-label{font-size:9px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.6px;margin:8px 0 4px;padding-bottom:3px;border-bottom:1px solid #1e1e1e}
.em-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.em-card{background:#222;border:1px solid #2a2a2a;border-radius:6px;padding:7px 8px;cursor:pointer;transition:all .1s;text-align:center;min-width:70px}
.em-card:hover{border-color:#C85C3E;background:#1e1008}
.em-card.on{border-color:#C85C3E;background:#1e1008}
.em-emoji{font-size:22px;line-height:1;margin-bottom:3px}
.em-lbl{font-size:8px;color:#888;line-height:1.2}
/* emotion button in panel editor */
.em-btn{display:flex;align-items:center;gap:5px;background:#111;border:1px solid #2e2e2e;border-radius:4px;padding:4px 7px;cursor:pointer;font-size:10px;color:#bbb;transition:all .1s;width:100%}
.em-btn:hover{border-color:#C85C3E;color:#C85C3E}

/* ── SFX STYLES ── */
.sfx-action{font-weight:900;font-style:italic;fill:#C85C3E;stroke:#2C2416;stroke-width:3;paint-order:stroke}
.sfx-cute{font-weight:700;fill:#F08080;stroke:#fff;stroke-width:2;paint-order:stroke}
.sfx-horror{font-weight:900;fill:#2C2416;stroke:#8B0000;stroke-width:2;paint-order:stroke}

/* ── NARRATOR BOX ── */
/* rendered in SVG, no extra CSS needed */

/* ── DARK MODE (US-49) ── */
body.dark #ed{background:#0d0d0d;border-color:#1a1a1a}
body.dark .sec{background:#141414;border-color:#1e1e1e}
body.dark .ped{background:#0e0e0e;border-color:#181818}
body.dark .f input,body.dark .f textarea,body.dark .f select{background:#0a0a0a;border-color:#222;color:#bbb}
body.dark #toolbar{background:#0a0a0a;border-color:#181818}
body:not(.dark) #pv{background:#111}
body.dark #pv{background:#050505}

/* ── LAYOUT VISUAL PICKER ── */
#layout-picker{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:5px}
.lp-btn{background:#111;border:1px solid #2e2e2e;border-radius:5px;padding:6px 4px;cursor:pointer;transition:all .1s;display:flex;flex-direction:column;align-items:center;gap:3px}
.lp-btn:hover{border-color:#555}
.lp-btn.on{border-color:#C85C3E;background:#1e1008}
.lp-btn svg{width:36px;height:36px}
.lp-btn span{font-size:8px;color:#555}
.lp-btn.on span{color:#C85C3E}
</style>
</head>

<script>
// ══ FONT MAP ══
const FM={patrick:"'Patrick Hand',cursive",bangers:"'Bangers',cursive",pangolin:"'Pangolin',cursive",caveat:"'Caveat',cursive",bevn:"'Be Vietnam Pro',sans-serif"};
const SZ={portrait:{W:1080,H:1920},square:{W:1080,H:1080},story:{W:1080,H:1350},wide:{W:1920,H:1080}};
const GAP=20,HDR=60,FTR=50;

// ══ STATE ══
const S={
  layout:'2x2',size:'portrait',bgColor:'#E08160',
  font:'patrick',fontSize:40,
  bubbleShape:'oval',
  bubbleScale:1.0,
  title:'DŨNG & HÀ LAN',ep:'TẬP 02',brand:'DREAMERS',
  panels:[
    {char1:'dung-sweat',char2:'none',bg:'bg-cafe',
     b1:{text:'ANH MUỐN NÓI\nVỚI CÔ MỘT\nCHUYỆN…',pos:'top-left'},
     b2:{text:'',pos:'top-right'},caption:''},
    {char1:'halan-smirk',char2:'none',bg:'bg-street',
     b1:{text:'ĐỪNG!',pos:'top-right'},
     b2:{text:'',pos:'top-left'},caption:''},
    {char1:'dung-confused',char2:'none',bg:'bg-cafe',
     b1:{text:'ĐỪNG GÌ?',pos:'top-left'},
     b2:{text:'',pos:'top-right'},
     caption:'anh chỉ định hỏi cô biết quán phở nào ngon\nở Hai Bà Trưng không thôi mà…\n— cô nghĩ anh nói gì?'},
    {char1:'halan-embarrassed',char2:'none',bg:'bg-room',
     b1:{text:'…À.',pos:'top-right'},
     b2:{text:'',pos:'top-left'},
     caption:'tưởng cái khác.\nphở Lý Quốc Sư đi.\nđông nhưng đáng.\ncấm hỏi thêm.\n— không nhìn vào mắt anh —'},
  ]
};

// ══════════════════════════════════════════════════
// US-45: UNDO / REDO  (50-step history)
// ══════════════════════════════════════════════════
const HIST={stack:[],ptr:-1,max:50};
function snapshot(){
  const snap=JSON.stringify(S);
  // drop redo branch
  HIST.stack=HIST.stack.slice(0,HIST.ptr+1);
  HIST.stack.push(snap);
  if(HIST.stack.length>HIST.max) HIST.stack.shift();
  HIST.ptr=HIST.stack.length-1;
  updateUndoUI();
}
function undo(){
  if(HIST.ptr<=0) return;
  HIST.ptr--;
  applySnap(HIST.stack[HIST.ptr]);
}
function redo(){
  if(HIST.ptr>=HIST.stack.length-1) return;
  HIST.ptr++;
  applySnap(HIST.stack[HIST.ptr]);
}
function applySnap(snap){
  const data=JSON.parse(snap);
  Object.assign(S,data);
  // sync sliders/inputs
  document.getElementById('fsl').textContent=S.fontSize;
  document.querySelector('input[oninput*="fontSize"]').value=S.fontSize;
  document.getElementById('bszl').textContent=Math.round((S.bubbleScale||1)*100);
  document.querySelector('input[oninput*="bubbleScale"]').value=Math.round((S.bubbleScale||1)*100);
  // sync layout buttons
  document.querySelectorAll('#layout-picker .lp-btn').forEach(b=>{
    b.classList.toggle('on', b.getAttribute('onclick')?.includes(`'${S.layout}'`));
  });
  buildEd(); render(); updateUndoUI();
}
function updateUndoUI(){
  const bu=document.getElementById('btn-undo');
  const br=document.getElementById('btn-redo');
  if(bu) bu.disabled=HIST.ptr<=0;
  if(br) br.disabled=HIST.ptr>=HIST.stack.length-1;
}
// intercept render to also snapshot — debounced so rapid typing doesn't flood
let _snapTimer=null;
function snap(){
  clearTimeout(_snapTimer);
  _snapTimer=setTimeout(snapshot,400);
}

// ══════════════════════════════════════════════════
// US-47: AUTOSAVE + OFFLINE DRAFT
// ══════════════════════════════════════════════════
const SAVE_KEY='dreamers-comic-draft';
let _saveTimer=null;
function scheduleSave(){
  const el=document.getElementById('save-status');
  if(el){el.className='saving';el.textContent='Đang lưu…';}
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>{
    try{
      localStorage.setItem(SAVE_KEY, JSON.stringify(S));
      localStorage.setItem(SAVE_KEY+'-ts', Date.now());
      if(el){el.className='';el.textContent='Đã lưu '+new Date().toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'});}
    }catch(e){
      if(el){el.className='offline';el.textContent='Lưu thất bại';}
    }
  },1500);
}
function loadDraft(){
  try{
    const raw=localStorage.getItem(SAVE_KEY);
    if(!raw) return false;
    const data=JSON.parse(raw);
    Object.assign(S,data);
    const ts=localStorage.getItem(SAVE_KEY+'-ts');
    const el=document.getElementById('save-status');
    if(el&&ts) el.textContent='Draft '+new Date(+ts).toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'});
    return true;
  }catch(e){return false;}
}

let _ctxPanelIdx=-1;
function showCtxMenu(e,i){
  e.preventDefault(); e.stopPropagation();
  _ctxPanelIdx=i;
  const m=document.getElementById('ctx-menu');
  m.style.left=Math.min(e.clientX, window.innerWidth-180)+'px';
  m.style.top=Math.min(e.clientY, window.innerHeight-160)+'px';
  m.classList.add('open');
}
function closeCtxMenu(){document.getElementById('ctx-menu').classList.remove('open');}
function ctxDuplicate(){
  if(_ctxPanelIdx<0) return;
  const clone=JSON.parse(JSON.stringify(S.panels[_ctxPanelIdx]));
  clone.b1={...clone.b1,text:''};
  clone.b2={...clone.b2,text:''};
  S.panels.splice(_ctxPanelIdx+1,0,clone);
  // upgrade layout if needed
  const layoutUpgrade={'1x1':'1x2','1x2':'1x3','1x3':'1x4','2x1':'2x2'};
  if(S.panels.length>cnt() && layoutUpgrade[S.layout]){
    setLayoutKey(layoutUpgrade[S.layout]);
  }
  buildEd();render();snap();scheduleSave();
  closeCtxMenu();
}
function ctxMoveLeft(){
  if(_ctxPanelIdx<=0) return;
  [S.panels[_ctxPanelIdx-1],S.panels[_ctxPanelIdx]]=[S.panels[_ctxPanelIdx],S.panels[_ctxPanelIdx-1]];
  buildEd();render();snap();scheduleSave();closeCtxMenu();
}
function ctxMoveRight(){
  if(_ctxPanelIdx>=S.panels.length-1) return;
  [S.panels[_ctxPanelIdx+1],S.panels[_ctxPanelIdx]]=[S.panels[_ctxPanelIdx],S.panels[_ctxPanelIdx+1]];
  buildEd();render();snap();scheduleSave();closeCtxMenu();
}
function ctxClear(){
  if(_ctxPanelIdx<0) return;
  S.panels[_ctxPanelIdx].b1.text='';
  S.panels[_ctxPanelIdx].b2.text='';
  S.panels[_ctxPanelIdx].caption='';
  buildEd();render();snap();scheduleSave();closeCtxMenu();
}
document.addEventListener('click',()=>closeCtxMenu());

// ══ US-14: PANEL DRAG-AND-DROP REORDER ══
let _dragSrc=-1;
function initDnD(){
  const peds=document.querySelectorAll('.ped');
  peds.forEach(ped=>{
    ped.addEventListener('dragstart',e=>{
      _dragSrc=+ped.dataset.idx;
      ped.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
    });
    ped.addEventListener('dragend',()=>{
      document.querySelectorAll('.ped').forEach(p=>{p.classList.remove('dragging','drag-over');});
    });
    ped.addEventListener('dragover',e=>{
      e.preventDefault();e.dataTransfer.dropEffect='move';
      document.querySelectorAll('.ped').forEach(p=>p.classList.remove('drag-over'));
      ped.classList.add('drag-over');
    });
    ped.addEventListener('drop',e=>{
      e.preventDefault();
      const dst=+ped.dataset.idx;
      if(_dragSrc===dst||_dragSrc<0) return;
      const moved=S.panels.splice(_dragSrc,1)[0];
      S.panels.splice(dst,0,moved);
      buildEd();render();snap();scheduleSave();
    });
  });
}

// ══ US-24: AUTO TEXT-FIT HELPER ══
// Called inside mkBubble — shrinks fSz if text overflows bubble
function autoFitFontSize(text,maxBW,padX,fSzStart,minFSz=20){
  let fSz=fSzStart;
  while(fSz>minFSz){
    const lines=wrapL(text,maxBW-padX*2,fSz);
    const lineMaxW=lines.reduce((m,l)=>Math.max(m,l.length*fSz*0.52),0);
    const bw=lineMaxW+padX*2+6;
    const bh=lines.length*fSz*1.28+padX;
    // check fits in max width
    if(bw<=maxBW) break;
    fSz-=2;
  }
  return Math.max(fSz,minFSz);
}

// ══ RENDER ══
function render(){
  const {W,H}=SZ[S.size];
  const {c,r}=grd();
  const n=cnt();
  const font=FM[S.font];
  const aW=W-GAP*(c+1), aH=H-HDR-FTR-GAP*(r+1);
  const pW=Math.floor(aW/c), pH=Math.floor(aH/r);
  let panels='';

  if(S.layout==='1+2'){
    // Special: 1 large left + 2 small right
    const bigW=Math.floor(aW*0.55), smW=aW-bigW-GAP;
    const smH=Math.floor((aH-GAP)/2);
    panels+=mkPanel(GAP, HDR+GAP, bigW, aH, S.panels[0]||{}, font);
    panels+=mkPanel(GAP+bigW+GAP, HDR+GAP, smW, smH, S.panels[1]||{}, font);
    panels+=mkPanel(GAP+bigW+GAP, HDR+GAP+smH+GAP, smW, smH, S.panels[2]||{}, font);
  } else {
    for(let i=0;i<n;i++){
      const col=i%c,row=Math.floor(i/c);
      panels+=mkPanel(GAP+col*(pW+GAP), HDR+GAP+row*(pH+GAP), pW, pH, S.panels[i]||{}, font);
    }
  }
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" style="font-family:${font}" id="comic-svg">
<defs>${getDefs()}<pattern id="pBg" x="0" y="0" width="160" height="160" patternUnits="userSpaceOnUse">
<rect width="160" height="160" fill="#F2ECD8"/>
<circle cx="13" cy="22" r=".7" fill="#2C2416" opacity=".13"/>
<circle cx="67" cy="44" r=".6" fill="#2C2416" opacity=".11"/>
<circle cx="89" cy="78" r=".7" fill="#2C2416" opacity=".10"/>
<circle cx="34" cy="91" r=".6" fill="#2C2416" opacity=".13"/>
</pattern>
<filter id="gr"><feTurbulence type="fractalNoise" baseFrequency="1.4" numOctaves="2" seed="12"/>
<feColorMatrix values="0 0 0 0 0.17 0 0 0 0 0.14 0 0 0 0 0.09 0 0 0 0.10 0"/></filter>
</defs>
<rect width="${W}" height="${H}" fill="url(#pBg)"/>
${mkHdr(W,H,font)}
${panels}
${mkFtr(W,H,font)}
<rect width="${W}" height="${H}" filter="url(#gr)" opacity="0.18" pointer-events="none"/>
</svg>`;
  const cw=document.getElementById('cw');
  cw.innerHTML=svg;
  const el=cw.querySelector('svg');
  const maxW=document.getElementById('pv').clientWidth-24;
  const maxH=document.getElementById('pv').clientHeight-24;
  const sc=Math.min(maxW/W,maxH/H,1);
  el.style.width=W*sc+'px';el.style.height=H*sc+'px';
}

function mkHdr(W,H,f){
  return `<rect x="0" y="0" width="${W}" height="${HDR}" fill="#2C2416" opacity="0.88"/>
<text x="18" y="${HDR*.65}" font-family="${f}" font-size="20" font-weight="700" fill="#F2ECD8" opacity=".9" letter-spacing="1">${esc(S.title.toUpperCase())}</text>
<text x="${W-18}" y="${HDR*.65}" font-family="${f}" font-size="15" fill="#F2ECD8" opacity=".55" text-anchor="end">${esc(S.ep.toUpperCase())}</text>`;
}
function mkFtr(W,H,f){
  const y=H-FTR;
  return `<rect x="0" y="${y}" width="${W}" height="${FTR}" fill="#2C2416" opacity="0.88"/>
<text x="${W-18}" y="${y+FTR*.66}" font-family="${f}" font-size="16" font-weight="700" fill="#F2ECD8" opacity=".65" text-anchor="end" letter-spacing="2">◉ ${esc(S.brand.toUpperCase())}</text>`;
}

// ══ PANEL ══
function mkPanel(px,py,pW,pH,panel,font){
  const bg=S.bgColor;

  // ── narrator box height (US-23) ──
  const hasNarr1=(panel.b1?.type==='narrator'&&panel.b1?.text?.trim());
  const hasNarr2=(panel.b2?.type==='narrator'&&panel.b2?.text?.trim());
  const narrFS=Math.round(S.fontSize*.62);
  const narrH1=hasNarr1 ? wrapL(panel.b1.text,pW-24,narrFS).length*narrFS*1.4+12 : 0;
  const narrH2=hasNarr2 ? wrapL(panel.b2.text,pW-24,narrFS).length*narrFS*1.4+12 : 0;

  // ── caption height ──
  const capLines=panel.caption&&panel.caption.trim() ? wrapL(panel.caption,pW-48,S.fontSize*.7) : [];
  const capH=capLines.length ? capLines.length*Math.round(S.fontSize*.78)+18 : 0;
  const charZoneH=pH-capH-narrH1-narrH2;

  // ── background ──
  const clipId=`clip-${Math.round(px)}-${Math.round(py)}`;
  const bgId=panel.bg&&panel.bg!=='bg-plain'?panel.bg:null;
  let bgSVG='';
  if(bgId){
    bgSVG=`<defs><clipPath id="${clipId}"><rect x="${px}" y="${py}" width="${pW}" height="${pH}" rx="2"/></clipPath></defs>
<use href="#${bgId}" x="${px}" y="${py}" width="${pW}" height="${charZoneH}" clip-path="url(#${clipId})"/>`;
  }

  // ── characters (US-08: up to 4) ──
  const chars=[panel.char1,panel.char2,panel.char3,panel.char4].filter(c=>c&&c!=='none');
  const scales=[panel.scale1||100,panel.scale2||100,100,100];
  const cxPositions=chars.length<=1?[.5]:chars.length===2?[.28,.72]:chars.length===3?[.2,.5,.8]:[.15,.38,.62,.85];
  let charSVG='';
  chars.forEach((cid,ci)=>{
    charSVG+=placeChar(cid, px+pW*cxPositions[ci], py, pW, charZoneH, scales[ci]/100, chars.length);
  });

  // ── bubbles ──
  let bubSVG='';
  const narrs=[];
  [panel.b1,panel.b2].forEach(b=>{
    if(!b?.text?.trim()) return;
    if(b.type==='narrator') narrs.push(b);
    else bubSVG+=mkBubble(b.text, b.pos||'top-left', px, py, pW, charZoneH, font, b.shape||'', b.type||'speech');
  });

  // ── narrator boxes (US-23) ──
  let narrSVG='';
  let narrY=py+narrH1?py:py; // top narrator
  narrs.forEach((b,ni)=>{
    const ny=ni===0?py:py+pH-narrH2;
    const nLines=wrapL(b.text,pW-24,narrFS);
    const nH=nLines.length*narrFS*1.4+12;
    narrSVG+=`<rect x="${px}" y="${ny}" width="${pW}" height="${nH}" fill="#1E1810" opacity=".88"/>`;
    nLines.forEach((ln,li)=>{
      narrSVG+=`<text x="${px+pW/2}" y="${ny+8+li*narrFS*1.4+narrFS}" font-family="${font}" font-size="${narrFS}"
fill="#F2ECD8" text-anchor="middle">${esc(ln)}</text>`;
    });
  });

  // ── SFX text (US-22) ──
  let sfxSVG='';
  if(panel.sfx&&panel.sfx.trim()){
    const sfxX=px+pW*0.5, sfxY=py+charZoneH*0.45;
    const rot=panel.sfxRot||0;
    const sty=panel.sfxStyle||'action';
    const sfxFill=sty==='action'?'#C85C3E':sty==='cute'?'#F08080':'#2C2416';
    const sfxStroke=sty==='horror'?'#8B0000':'#2C2416';
    const sfxFS=Math.round(S.fontSize*1.6);
    sfxSVG=`<text x="${sfxX}" y="${sfxY}" font-family="${font}" font-size="${sfxFS}" font-weight="900"
font-style="italic" fill="${sfxFill}" stroke="${sfxStroke}" stroke-width="3" paint-order="stroke"
text-anchor="middle" transform="rotate(${rot},${sfxX},${sfxY})">${esc(panel.sfx)}</text>`;
  }

  // ── caption strip ──
  let capSVG='';
  if(capLines.length){
    const cy=py+pH-capH;
    const lh=Math.round(S.fontSize*.78);
    capSVG=`<rect x="${px}" y="${cy}" width="${pW}" height="${capH}" fill="#F2ECD8" opacity=".9"/>
<line x1="${px}" y1="${cy}" x2="${px+pW}" y2="${cy}" stroke="#2C2416" stroke-width="1" opacity=".12"/>`;
    capLines.forEach((line,i)=>{
      const note=line.trim().startsWith('—')||line.trim().startsWith('-');
      const fs=note?Math.round(S.fontSize*.6):Math.round(S.fontSize*.68);
      capSVG+=`<text x="${px+pW/2}" y="${cy+10+i*lh+fs}" font-family="${font}" font-size="${fs}"
font-style="${note?'italic':'normal'}" fill="${note?'#C66A4A':'#2C2416'}" text-anchor="middle">${esc(line)}</text>`;
    });
  }

  return `<g>
<rect x="${px}" y="${py}" width="${pW}" height="${pH}" fill="${bg}" rx="2"/>
${bgSVG}${charSVG}${sfxSVG}${bubSVG}${narrSVG}${capSVG}
<rect x="${px}" y="${py}" width="${pW}" height="${pH}" fill="none" stroke="#2C2416" stroke-width="4" rx="2"/>
</g>`;
}

// ══ CHAR PLACEMENT (US-04 scale, US-08 group) ══
// scaleMul: 0.5–1.5 from slider; nChars: total chars in panel
function placeChar(id, cx, panelY, pW, charZoneH, scaleMul, nChars){
  const dW=120, dH=160;
  const slotW = pW / Math.max(nChars, 1);
  const maxH = charZoneH * 0.80;
  const maxW = slotW * (nChars===1 ? 0.6 : 0.52);
  let sc = Math.min(maxH/dH, maxW/dW) * (scaleMul||1);
  // if scale > 1.2 we allow clipping top but keep feet anchored
  const cw=dW*sc, ch=dH*sc;
  const y=panelY+charZoneH*0.92-ch;
  const x=cx-cw/2;
  return `<use href="#${id}" x="${x}" y="${y}" width="${cw}" height="${ch}"/>`;
}

// ══ BUBBLE ENGINE (US-19/20/21 types) ══
function mkBubble(text,pos,px,py,pW,charZoneH,font,shapeOverride,bubType){
  // US-20/21: override shape based on type
  const type=bubType||'speech';
  let shape=shapeOverride||S.bubbleShape||'oval';
  if(type==='thought') shape='cloud';
  if(type==='shout')   shape='shout';

  // US-21: whisper = font -20%, dashed border, lighter fill
  const isWhisper=type==='whisper';
  // US-21: shout = font +20%
  const isShout=type==='shout';

  const fSzBase = S.fontSize * (isWhisper?.8:isShout?1.2:1);
  const fSz = autoFitFontSize(text, Math.min(pW*.6,pW-36)*(S.bubbleScale||1), shape==='oval'?fSzBase*.9:14, fSzBase);
  const sc  = S.bubbleScale || 1;
  const margin = 18;

  // ── text layout ──
  const maxBW = Math.min(pW * 0.60, pW - margin * 2) * sc;
  const padX  = shape==='oval' ? fSz*0.9  : 14;
  const padY  = shape==='oval' ? fSz*0.55 : 10;
  const lines = wrapL(text, maxBW - padX*2, fSz);
  const lh    = fSz * 1.28;
  const lineMaxW = lines.reduce((m,l)=>Math.max(m, l.length*fSz*0.52), 0);

  // ── bubble dimensions ──
  let bw = Math.min(maxBW, lineMaxW + padX*2 + 6);
  let bh = lines.length * lh + padY*2;

  // oval: make it rounder — increase padding so width ≥ height ratio ~1.6:1
  if(shape==='oval'){
    bw = Math.max(bw, bh * 1.3);
    bh = Math.max(bh, bw * 0.55);
  }
  // cloud: square-ish
  if(shape==='cloud'){
    bw = Math.max(bw, bh * 1.2);
    bh = Math.max(bh, bw * 0.7);
  }
  // shout: add spike margin
  if(shape==='shout'){
    bw += 20; bh += 14;
  }

  const tailH = shape==='cloud' ? 0 : Math.round(16 * sc);

  // ── position ──
  const isTop  = pos.startsWith('top');
  const hPart  = pos.split('-')[1];
  let bx, by;
  if(hPart==='left')        bx = px + margin;
  else if(hPart==='right')  bx = px + pW - margin - bw;
  else                      bx = px + pW/2 - bw/2;

  const bottomRoom = bh + tailH + margin + 4;
  if(isTop) by = py + margin;
  else      by = py + charZoneH - bottomRoom;

  // clamp within panel
  bx = Math.max(px+3, Math.min(bx, px+pW-bw-3));
  by = Math.max(py+3, Math.min(by, py+charZoneH-bh-tailH-3));

  const cx = bx + bw/2;       // bubble horizontal center
  const cy = by + bh/2;       // bubble vertical center
  const sw = 2.8;              // stroke width

  // ── US-21 whisper/shout styling ──
  const bubFill   = isWhisper ? '#F5F5F0' : '#FBF8E8';
  const bubStroke = isWhisper ? '#8A8078' : '#2C2416';
  const bubDash   = isWhisper ? 'stroke-dasharray="6,3"' : '';
  const textFill  = isWhisper ? '#7A7068' : '#2C2416';
  const textW     = isShout   ? '900' : '700';

  // ── text rows ──
  const textY0 = by + padY + fSz * 0.92;
  const textRows = lines.map((l,i)=>
    `<text x="${cx}" y="${textY0+i*lh}" font-family="${font}" font-size="${fSz}"
font-weight="${textW}" fill="${textFill}" text-anchor="middle">${esc(l)}</text>`
  ).join('');

  // ── shape SVG ──
  let shapeSVG = '';

  if(shape==='oval'){
    // pure ellipse body — Gia Đình Ngộ style
    const rx = bw/2, ry = bh/2;
    // tail: curved bezier spike from ellipse edge
    const tailAnchorX = cx + (hPart==='right'? rx*0.3 : hPart==='left'? -rx*0.3 : 0);
    let tailSVG = '';
    if(isTop){
      const ay = by + bh;                   // bottom of ellipse
      const tipX = tailAnchorX + (hPart==='right'? 8 : hPart==='left'? -8 : 0);
      const tipY = ay + tailH;
      // curved tail — one side straight, one concave (classic Korean/VN webtoon style)
      tailSVG=`<path d="M ${tailAnchorX-6} ${ay-4}
  Q ${tailAnchorX-2} ${ay+tailH*0.6} ${tipX} ${tipY}
  Q ${tailAnchorX+8} ${ay+tailH*0.5} ${tailAnchorX+8} ${ay-4} Z"
  fill="#FBF8E8" stroke="#2C2416" stroke-width="${sw}" stroke-linejoin="round"/>`;
    } else {
      const ay = by;
      const tipX = tailAnchorX + (hPart==='right'? 8 : hPart==='left'? -8 : 0);
      const tipY = ay - tailH;
      tailSVG=`<path d="M ${tailAnchorX-6} ${ay+4}
  Q ${tailAnchorX-2} ${ay-tailH*0.6} ${tipX} ${tipY}
  Q ${tailAnchorX+8} ${ay-tailH*0.5} ${tailAnchorX+8} ${ay+4} Z"
  fill="#FBF8E8" stroke="#2C2416" stroke-width="${sw}" stroke-linejoin="round"/>`;
    }
    shapeSVG=`${tailSVG}
<ellipse cx="${cx}" cy="${cy}" rx="${rx}" ry="${ry}"
  fill="${bubFill}" stroke="${bubStroke}" stroke-width="${sw}" ${bubDash}/>`;
  }

  else if(shape==='rect'){
    // rounded rectangle (original style, improved)
    const r = Math.min(14, bh*0.35);
    const tailCX = Math.min(Math.max(cx, bx+r+8), bx+bw-r-8);
    let tailSVG='';
    if(isTop){
      const ty=by+bh;
      tailSVG=`<path d="M ${tailCX-8} ${ty} Q ${tailCX} ${ty+tailH*0.6} ${tailCX} ${ty+tailH} Q ${tailCX} ${ty+tailH*0.6} ${tailCX+8} ${ty} Z"
fill="#FBF8E8" stroke="#2C2416" stroke-width="${sw}" stroke-linejoin="round"/>`;
    } else {
      const ty=by;
      tailSVG=`<path d="M ${tailCX-8} ${ty} Q ${tailCX} ${ty-tailH*0.6} ${tailCX} ${ty-tailH} Q ${tailCX} ${ty-tailH*0.6} ${tailCX+8} ${ty} Z"
fill="#FBF8E8" stroke="#2C2416" stroke-width="${sw}" stroke-linejoin="round"/>`;
    }
    const bp=`M ${bx+r} ${by} L ${bx+bw-r} ${by} Q ${bx+bw} ${by} ${bx+bw} ${by+r}
L ${bx+bw} ${by+bh-r} Q ${bx+bw} ${by+bh} ${bx+bw-r} ${by+bh}
L ${bx+r} ${by+bh} Q ${bx} ${by+bh} ${bx} ${by+bh-r}
L ${bx} ${by+r} Q ${bx} ${by} ${bx+r} ${by} Z`;
    shapeSVG=`${tailSVG}
<path d="${bp}" fill="#FBF8E8" stroke="#2C2416" stroke-width="${sw}" stroke-linejoin="round"/>`;
  }

  else if(shape==='cloud'){
    // cloud bubble — series of overlapping circles on perimeter + small thought dots
    const rx=bw/2, ry=bh/2;
    const bumps=Math.max(5, Math.round(bw/38));
    const br=bh*0.22; // bump radius
    let cloudPath=`<ellipse cx="${cx}" cy="${cy}" rx="${rx*0.94}" ry="${ry*0.88}" fill="#FBF8E8" stroke="none"/>`;
    // top bumps
    for(let b=0;b<bumps;b++){
      const bx2=bx+br+(b/(bumps-1))*(bw-br*2);
      cloudPath+=`<circle cx="${bx2}" cy="${by+br*0.4}" r="${br}" fill="#FBF8E8" stroke="#2C2416" stroke-width="${sw*0.9}"/>`;
    }
    // bottom bumps
    for(let b=0;b<bumps;b++){
      const bx2=bx+br+(b/(bumps-1))*(bw-br*2);
      cloudPath+=`<circle cx="${bx2}" cy="${by+bh-br*0.4}" r="${br}" fill="#FBF8E8" stroke="#2C2416" stroke-width="${sw*0.9}"/>`;
    }
    // left/right small bumps
    cloudPath+=`<circle cx="${bx+br*0.4}" cy="${cy}" r="${br*0.85}" fill="#FBF8E8" stroke="#2C2416" stroke-width="${sw*0.9}"/>`;
    cloudPath+=`<circle cx="${bx+bw-br*0.4}" cy="${cy}" r="${br*0.85}" fill="#FBF8E8" stroke="#2C2416" stroke-width="${sw*0.9}"/>`;
    // white interior fill over strokes
    cloudPath+=`<ellipse cx="${cx}" cy="${cy}" rx="${rx*0.88}" ry="${ry*0.82}" fill="#FBF8E8" stroke="none"/>`;
    // thought dots tail
    const dotDir = isTop ? 1 : -1;
    const dotStartX = hPart==='right' ? cx+rx*0.3 : hPart==='left' ? cx-rx*0.3 : cx;
    const dotStartY = isTop ? by+bh+br*0.4 : by-br*0.4;
    cloudPath+=`<circle cx="${dotStartX}" cy="${dotStartY+dotDir*8}" r="${br*0.55}" fill="#FBF8E8" stroke="#2C2416" stroke-width="${sw*0.85}"/>`;
    cloudPath+=`<circle cx="${dotStartX+(hPart==='right'?4:hPart==='left'?-4:0)}" cy="${dotStartY+dotDir*18}" r="${br*0.38}" fill="#FBF8E8" stroke="#2C2416" stroke-width="${sw*0.8}"/>`;
    cloudPath+=`<circle cx="${dotStartX+(hPart==='right'?7:hPart==='left'?-7:0)}" cy="${dotStartY+dotDir*26}" r="${br*0.25}" fill="#FBF8E8" stroke="#2C2416" stroke-width="${sw*0.75}"/>`;
    shapeSVG=cloudPath;
  }

  else if(shape==='shout'){
    // spiky shout bubble — jagged border
    const rx=bw/2, ry=bh/2;
    const spikes=10;
    const outerR=Math.max(rx,ry)+10;
    const innerRx=rx, innerRy=ry;
    let pts='';
    for(let i=0;i<spikes*2;i++){
      const angle=(i/spikes)*Math.PI - Math.PI/2;
      const r2 = i%2===0 ? outerR : Math.sqrt(innerRx*innerRx*Math.cos(angle)*Math.cos(angle)+innerRy*innerRy*Math.sin(angle)*Math.sin(angle));
      pts+=`${cx+Math.cos(angle)*r2},${cy+Math.sin(angle)*r2} `;
    }
    // tail
    const tailCX2=cx+(hPart==='right'?rx*0.4:hPart==='left'?-rx*0.4:0);
    let tailSVG2='';
    if(isTop){
      const ty=cy+ry;
      tailSVG2=`<polygon points="${tailCX2-9},${ty} ${tailCX2},${ty+tailH+6} ${tailCX2+9},${ty}"
fill="#FBF8E8" stroke="#2C2416" stroke-width="${sw}" stroke-linejoin="round"/>`;
    } else {
      const ty=cy-ry;
      tailSVG2=`<polygon points="${tailCX2-9},${ty} ${tailCX2},${ty-tailH-6} ${tailCX2+9},${ty}"
fill="#FBF8E8" stroke="#2C2416" stroke-width="${sw}" stroke-linejoin="round"/>`;
    }
    shapeSVG=`${tailSVG2}
<polygon points="${pts.trim()}" fill="#FBF8E8" stroke="#2C2416" stroke-width="${sw}" stroke-linejoin="round"/>`;
  }

  return `<g>${shapeSVG}${textRows}</g>`;
}

// ══ UTILS ══
function wrapL(text,maxW,fSz){
  const avgW=fSz*0.52;
  const maxC=Math.max(4,Math.floor(maxW/avgW));
  const out=[];
  for(const para of text.split('\n')){
    if(!para.trim()){continue;}
    const words=para.split(' ');let line='';
    for(const w of words){const t=line?line+' '+w:w;if(t.length>maxC&&line){out.push(line);line=w;}else line=t;}
    if(line)out.push(line);
  }
  return out;
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function getDefs(){const s=document.querySelector('svg[aria-hidden="true"] defs');return s?s.innerHTML:'';}

// ══ EXPORT ══
document.getElementById('btn-exp').addEventListener('click',async()=>{
  const btn=document.getElementById('btn-exp'),hint=document.getElementById('hint');
  btn.disabled=true;btn.textContent='Đang render…';hint.textContent='Nhúng font…';
  try{
    await document.fonts.ready;
    const svgEl=document.querySelector('#cw svg');
    let fontCSS='';
    try{
      const fams={patrick:'Patrick+Hand',bangers:'Bangers',pangolin:'Pangolin',caveat:'Caveat:wght@400;700',bevn:'Be+Vietnam+Pro:wght@400;500;700'};
      const resp=await fetch(`https://fonts.googleapis.com/css2?family=${fams[S.font]}&display=swap`,{headers:{'User-Agent':'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36'}});
      let css=await resp.text();
      const urls=[...new Set([...css.matchAll(/url\((https:\/\/fonts\.gstatic\.com\/[^)]+)\)/g)].map(m=>m[1]))];
      const uris={};
      await Promise.all(urls.map(async u=>{const r=await fetch(u);const b=await r.blob();const rd=new FileReader();uris[u]=await new Promise((res,rej)=>{rd.onload=()=>res(rd.result);rd.onerror=rej;rd.readAsDataURL(b);});}));
      urls.forEach(u=>{css=css.split(u).join(uris[u]);});fontCSS=css;
    }catch(e){console.warn(e);}
    hint.textContent='Xuất ảnh…';
    const {W}=SZ[S.size];
    const sc=W/svgEl.clientWidth;
    const url=await htmlToImage.toPng(svgEl,{cacheBust:true,pixelRatio:sc,backgroundColor:'#F2ECD8',fontEmbedCSS:fontCSS,style:{borderRadius:'0',boxShadow:'none'}});
    const a=document.createElement('a');
    a.href=url;a.download=`${S.title.toLowerCase().replace(/[^a-z0-9]/g,'-')}-${S.ep.toLowerCase().replace(/[^a-z0-9]/g,'-')}-${S.size}.png`;
    document.body.appendChild(a);a.click();a.remove();
    btn.textContent='✓ Đã tải';hint.textContent=`${SZ[S.size].W}×${SZ[S.size].H}`;
    setTimeout(()=>{btn.textContent='⬇ Export PNG';btn.disabled=false;},2200);
  }catch(e){btn.textContent='⚠ Lỗi';hint.textContent=e.message;setTimeout(()=>{btn.textContent='⬇ Export PNG';btn.disabled=false;},2500);}
});

// ══ US-49: DARK MODE ══
function toggleDark(){
  document.body.classList.toggle('dark');
  const btn=document.getElementById('btn-dark');
  const isDark=document.body.classList.contains('dark');
  if(btn) btn.textContent=isDark?'☀️':'🌙';
  localStorage.setItem('dreamers-dark',isDark?'1':'');
}
// auto-detect system preference on first load
if(window.matchMedia('(prefers-color-scheme: dark)').matches||localStorage.getItem('dreamers-dark')){
  document.body.classList.add('dark');
}

// ══ US-17: WEBTOON VERTICAL STRIP EXPORT ══
async function exportWebtoon(){
  const btn=document.getElementById('btn-dark');
  const hint=document.getElementById('hint');
  hint.textContent='Đang tạo webtoon strip…';
  // Render 1-column vertical version regardless of current layout
  const origLayout=S.layout, origSize=S.size;
  S.layout='1x'+cnt(); S.size='portrait';
  render();
  await new Promise(r=>setTimeout(r,200));
  try{
    const svgEl=document.querySelector('#cw svg');
    const {W}=SZ[S.size];
    const sc=W/svgEl.clientWidth;
    const url=await htmlToImage.toPng(svgEl,{cacheBust:true,pixelRatio:sc,backgroundColor:'#F2ECD8',style:{borderRadius:'0',boxShadow:'none'}});
    const a=document.createElement('a');
    a.href=url;a.download=`${S.title.toLowerCase().replace(/[^a-z0-9]/g,'-')}-webtoon.png`;
    document.body.appendChild(a);a.click();a.remove();
    hint.textContent='✓ Webtoon exported';
  }catch(e){ hint.textContent='⚠ '+e.message; }
  // restore
  S.layout=origLayout; S.size=origSize;
  render();
  setTimeout(()=>{hint.textContent='';},2000);
}

// ══ US-46: KEYBOARD SHORTCUTS ══
document.addEventListener('keydown',e=>{
  const mac=e.metaKey, ctrl=e.ctrlKey, mod=mac||ctrl;
  if(mod&&!e.shiftKey&&e.key==='z'){e.preventDefault();undo();return;}
  if(mod&&e.shiftKey&&e.key==='z'){e.preventDefault();redo();return;}
  if(mod&&e.key==='s'){e.preventDefault();scheduleSave();return;}
  if(mod&&e.key==='e'){e.preventDefault();document.getElementById('btn-exp').click();return;}
  if(mod&&e.key==='d'){e.preventDefault();if(_ctxPanelIdx>=0)ctxDuplicate();return;}
  // ? = show shortcuts hint
  if(e.key==='?'&&!e.target.closest('input,textarea,select')){
    alert('Shortcuts:\nCmd+Z — Undo\nCmd+Shift+Z — Redo\nCmd+S — Lưu draft\nCmd+E — Export PNG\n? — Help');
  }
});
